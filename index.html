<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Haven</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            background-color: #3e2723;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #5d4037;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center/cover;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        .container {
            padding: 20px;
        }

        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        footer {
            background-color: #3e2723;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Coffee Haven ☕</h1>
    <p>Your Daily Dose of Fresh Coffee</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Welcome to Coffee Haven
</div>

<div class="container">
    <h2>Our Menu</h2>
    <div class="menu">
        <div class="item">
            <h3>Espresso</h3>
            <p>Strong & bold coffee</p>
            <p>$2</p>
        </div>
        <div class="item">
            <h3>Cappuccino</h3>
            <p>Creamy & smooth</p>
            <p>$3</p>
        </div>
        <div class="item">
            <h3>Latte</h3>
            <p>Rich milk coffee</p>
            <p>$3.5</p>
        </div>
        <div class="item">
            <h3>Mocha</h3>
            <p>Chocolate flavored</p>
            <p>$4</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Coffee Haven | Made with ❤️</p>
</footer>

</body>
</html>
